<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Detect mount path: support both azure-root and /trading-dashboard/ sub-path.
    window.BASE = (location.pathname.match(/^(\/trading-dashboard)(\/|$)/) || [,''])[1];
    // Patch fetch so /api/* and /static/* hit the correct prefix.
    (function(){
      const o = window.fetch;
      window.fetch = function(input, init){
        if (typeof input === 'string' && window.BASE && (input.startsWith('/api/') || input.startsWith('/static/'))) {
          input = window.BASE + input;
        }
        return o.call(this, input, init);
      };
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Quant Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <link rel="stylesheet" href="static/css/style.css?v=15">
</head>
<body>
  <nav class="navbar glass-nav">
    <div class="nav-inner">
      <a href="#/" class="logo">
        <span class="logo-icon">◆</span>
        <span class="logo-text" data-i18n="brand">Cyber Quant Arena</span>
      </a>
      <div class="nav-links">
        <a href="#/trade" class="nav-link" data-route="trade" data-i18n="nav_trade">Trading Overview</a>
        <a href="#/backtest" class="nav-link" data-route="backtest" data-i18n="nav_backtest">Backtest Analysis</a>
        <a href="#/explore" class="nav-link" data-route="explore" data-i18n="nav_explore">Explore</a>
        <a href="#/frontier" class="nav-link" data-route="frontier" data-i18n="nav_frontier">Frontier</a>
        <a href="#/symbols" class="nav-link" data-route="symbols" data-i18n="nav_symbols">Symbols</a>
        <a href="#/intro" class="nav-link" data-route="intro" data-i18n="nav_intro">Intro</a>
      </div>
      <div class="market-tabs" id="market-tabs" role="tablist" aria-label="Market">
        <button class="market-tab active" data-market="US" role="tab">US <span class="market-tab-cur">$</span></button>
        <button class="market-tab" data-market="CN" role="tab">CN <span class="market-tab-cur">¥</span></button>
      </div>
      <div class="nav-status">
        <select id="lang-select" class="lang-select" aria-label="Language">
          <option value="en">EN</option>
          <option value="zh">中文</option>
        </select>
        <span class="market-badge" id="market-badge">US · $</span>
        <span class="live-dot"></span>
        <span class="live-text" data-i18n="nav_live">Live</span>
      </div>
    </div>
  </nav>

  <main id="app"></main>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="static/js/i18n.js?v=11"></script>
  <script src="static/js/components.js?v=12"></script>
  <script src="static/js/events.js?v=6"></script>
  <script src="static/js/trade.js?v=14"></script>
  <script src="static/js/backtest.js?v=14"></script>
  <script src="static/js/intro.js?v=3"></script>
  <script src="static/js/explore.js?v=3"></script>
  <script src="static/js/frontier.js?v=2"></script>
  <script src="static/js/symbols.js?v=3"></script>
  <script src="static/js/app.js?v=12"></script>
</body>
</html>
